<script>
        // Simple micro-interaction for password toggle
        const togglePass = document.querySelector('.material-symbols-outlined:last-of-type');
        const passInput = document.querySelector('input[type="password"]');
        
        if (togglePass && passInput) {
            togglePass.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                togglePass.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }

        // Add a subtle parallax effect on mouse/tilt for the glass card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
