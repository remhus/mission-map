<script>
        // Micro-interactions for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary-fixed-dim');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary-fixed-dim');
            });
        });

        // Simple parallax effect for background
        document.body.addEventListener('mousemove', (e) => {
            const bg = document.querySelector('img[data-alt]');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });
    </script>
